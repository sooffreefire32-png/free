name: Generate Flutter App Code

on:
  push:
    branches:
      - main
    paths:
      - 'idea.txt'

permissions:
  contents: write
  models: read

jobs:
  generate-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate Flutter code
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          IDEA_CONTENT: ${{ github.event.head_commit.message }} # Or read from file
        run: |
          # Better to read from file to avoid shell escaping issues
          export IDEA_CONTENT=$(cat idea.txt)
          python scripts/generate_app.py

      - name: Commit generated code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: Generate Flutter app from idea.txt" || echo "No changes to commit"
          git push
