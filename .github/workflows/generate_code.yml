name: 🚀 Generate Full-Stack App from idea.txt

on:
  push:
    paths:
      - 'idea.txt'
  workflow_dispatch:

jobs:
  generate-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 📖 Read idea.txt
        id: read_idea
        run: |
          IDEA=$(cat idea.txt)
          echo "idea<<EOF" >> $GITHUB_OUTPUT
          echo "$IDEA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🤖 Generate App Code via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          APP_IDEA: ${{ steps.read_idea.outputs.idea }}
        run: |
          python3 << 'PYEOF'
          import requests
          import os
          import json

          token = os.environ["GITHUB_TOKEN"]
          idea = os.environ["APP_IDEA"]
          
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          system_prompt = """You are an expert full-stack developer. Generate a massive, professional Flutter codebase (60+ files).
          Respond ONLY with a JSON object:
          {
            "app_name": "kebab-case-name",
            "files": {
              "lib/features/auth/presentation/login_screen.dart": "...",
              ...
            }
          }
          Rules:
          1. Generate at least 60+ files across lib/features (auth, jobs, chat, profile, payments).
          2. Focus ONLY on the 'lib/' folder and 'pubspec.yaml'. 
          3. Use Feature-first architecture (data, domain, presentation).
          4. Do NOT generate android/ files; the system will provide them."""

          data = {
              "model": "openai/gpt-4o",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": f"Generate 60+ files for this app:\n\n{idea}"}
              ],
              "response_format": {"type": "json_object"}
          }

          response = requests.post("https://models.github.ai/inference/chat/completions", headers=headers, json=data)
          response.raise_for_status()
          with open('/tmp/app_data.json', 'w') as f:
              f.write(response.json()['choices'][0]['message']['content'])
          PYEOF

      - name: 📁 Create App with Base Template
        run: |
          python3 << 'PYEOF'
          import json
          import os

          with open('/tmp/app_data.json', 'r') as f:
              app_data = json.load(f)

          app_name = app_data['app_name']
          files = app_data['files']
          os.makedirs(app_name, exist_ok=True)

          # --- 1. PROVIDE BASE ANDROID TEMPLATE ---
          template = {
              "android/build.gradle": "buildscript { ext.kotlin_version = '1.8.22' \n repositories { google() \n mavenCentral() } \n dependencies { classpath 'com.android.tools.build:gradle:7.3.0' \n classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version\" } }\nallprojects { repositories { google() \n mavenCentral() } }\nrootProject.buildDir = '../build'\nsubprojects { project.buildDir = \"${rootProject.buildDir}/${project.name}\" }\nsubprojects { project.evaluationDependsOn(':app') }\ntask clean(type: Delete) { delete rootProject.buildDir }",
              "android/app/build.gradle": "def localProperties = new Properties()\ndef localPropertiesFile = rootProject.file('local.properties')\nif (localPropertiesFile.exists()) { localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) } }\ndef flutterRoot = localProperties.getProperty('flutter.sdk')\napply plugin: 'com.android.application'\napply plugin: 'kotlin-android'\napply from: \"$flutterRoot/packages/flutter_tools/gradle/flutter.gradle\"\nandroid { compileSdkVersion 33 \n namespace \"com.example.\" + app_name.replace('-', '_') \n defaultConfig { applicationId \"com.example.\" + app_name.replace('-', '_') \n minSdkVersion 21 \n targetSdkVersion 33 \n versionCode 1 \n versionName \"1.0\" } }\nflutter { source '../..' }",
              "android/settings.gradle": "include ':app'\ndef localProperties = new Properties()\ndef localPropertiesFile = rootProject.file('local.properties')\nif (localPropertiesFile.exists()) { localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) } }\ndef flutterRoot = localProperties.getProperty('flutter.sdk')\nif (flutterRoot == null) { throw new Exception('Flutter SDK not found.') }\napply from: \"$flutterRoot/packages/flutter_tools/gradle/app_plugin_loader.gradle\"",
              "android/app/src/main/AndroidManifest.xml": "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"> <application android:label=\"App\" android:icon=\"@mipmap/ic_launcher\"> <activity android:name=\".MainActivity\" android:exported=\"true\"> <intent-filter> <action android:name=\"android.intent.action.MAIN\"/> <category android:name=\"android.intent.category.LAUNCHER\"/> </intent-filter> </activity> </application> </manifest>",
              "android/gradle/wrapper/gradle-wrapper.properties": "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-7.5-all.zip",
              "android/gradle.properties": "org.gradle.jvmargs=-Xmx1536M\nandroid.useAndroidX=true\nandroid.enableJetifier=true"
          }

          # Combine Template + AI Files
          for path, content in template.items():
              if path not in files:
                  files[path] = content

          for file_path, content in files.items():
              full_path = os.path.join(app_name, file_path)
              os.makedirs(os.path.dirname(full_path), exist_ok=True)
              with open(full_path, 'w', encoding='utf-8') as f:
                  f.write(content)

          with open('/tmp/app_name.txt', 'w') as f:
              f.write(app_name)
          PYEOF

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: 📤 Commit and Push Generated App
        run: |
          APP_NAME=$(cat /tmp/app_name.txt)
          git add "$APP_NAME/"
          git commit -m "🚀 Generated massive app with full android structure: $APP_NAME" || echo "No changes"
          git push origin HEAD
