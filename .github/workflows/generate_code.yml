name: 🚀 Generate Full-Stack App from idea.txt

on:
  push:
    paths:
      - 'idea.txt'
  workflow_dispatch:

jobs:
  generate-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 📖 Read idea.txt
        id: read_idea
        run: |
          if [ ! -f "idea.txt" ]; then
            echo "❌ idea.txt not found!"
            exit 1
          fi
          IDEA=$(cat idea.txt)
          echo "idea<<EOF" >> $GITHUB_OUTPUT
          echo "$IDEA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "✅ idea.txt read successfully"

      - name: 🤖 Generate App Code via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          APP_IDEA: ${{ steps.read_idea.outputs.idea }}
        run: |
          python3 << 'PYEOF'
          import requests
          import os
          import json

          token = os.environ["GITHUB_TOKEN"]
          idea = os.environ["APP_IDEA"]
          
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          system_prompt = """You are an expert full-stack developer. When given an app idea/prompt, you generate a complete, production-ready full-stack application.
          You MUST respond with ONLY a valid JSON object (no markdown, no explanation, no code blocks).
          The JSON structure must be exactly:
          {
            "app_name": "folder-name-in-kebab-case",
            "description": "short description",
            "tech_stack": {
              "frontend": "Flutter",
              "backend": "Firebase/Mock",
              "database": "Cloud Firestore/Mock"
            },
            "files": {
              "relative/path/to/file.ext": "complete file content here",
              "another/path/file.ext": "complete file content here"
            }
          }
          Rules:
          1. Generate at least 20-30 files for a professional Flutter project.
          2. Include EVERYTHING: pubspec.yaml, lib/ (models, screens, services, widgets), and full android/ folder with gradle and manifests.
          3. Ensure the app is ready for 'flutter build apk'.
          4. Do NOT use markdown code fences in file contents."""

          data = {
              "model": "openai/gpt-4o",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": f"Generate a complete Flutter application for this idea:\n\n{idea}"}
              ],
              "response_format": {"type": "json_object"}
          }

          print(f"🧠 Calling GitHub Models for: {idea[:50]}...")
          response = requests.post("https://models.github.ai/inference/chat/completions", headers=headers, json=data)
          response.raise_for_status()
          
          app_data = response.json()['choices'][0]['message']['content']
          with open('/tmp/app_data.json', 'w') as f:
              f.write(app_data)
          PYEOF

      - name: 📁 Create App Files
        run: |
          python3 << 'PYEOF'
          import json
          import os

          with open('/tmp/app_data.json', 'r') as f:
              app_data = json.load(f)

          app_name = app_data['app_name']
          files = app_data['files']
          base_dir = f"apps/{app_name}"

          print(f"📁 Creating folder: {base_dir}/")
          os.makedirs(base_dir, exist_ok=True)

          for file_path, content in files.items():
              full_path = os.path.join(base_dir, file_path)
              os.makedirs(os.path.dirname(full_path), exist_ok=True)
              with open(full_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f" ✅ Created: {file_path}")

          with open('/tmp/app_name.txt', 'w') as f:
              f.write(app_name)
          PYEOF

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: 📤 Commit and Push Generated App
        run: |
          APP_NAME=$(cat /tmp/app_name.txt)
          git add "apps/$APP_NAME/"
          git commit -m "🚀 Generated full-stack app: $APP_NAME" || echo "No changes"
          git push origin HEAD
