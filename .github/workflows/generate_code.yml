name: 🚀 Generate Full-Stack App from idea.txt

on:
  push:
    paths:
      - 'idea.txt'
  workflow_dispatch:

jobs:
  generate-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 📖 Read idea.txt
        id: read_idea
        run: |
          if [ ! -f "idea.txt" ]; then
            echo "❌ idea.txt not found!"
            exit 1
          fi
          IDEA=$(cat idea.txt)
          echo "idea<<EOF" >> $GITHUB_OUTPUT
          echo "$IDEA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "✅ idea.txt read successfully"

      - name: 🤖 Generate App Code via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          APP_IDEA: ${{ steps.read_idea.outputs.idea }}
        run: |
          python3 << 'PYEOF'
          import requests
          import os
          import json

          token = os.environ["GITHUB_TOKEN"]
          idea = os.environ["APP_IDEA"]
          
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          system_prompt = """You are an expert full-stack developer. When given an app idea/prompt, you generate a complete, production-ready full-stack application.
          You MUST respond with ONLY a valid JSON object (no markdown, no explanation, no code blocks).
          The JSON structure must be exactly:
          {
            "app_name": "folder-name-in-kebab-case",
            "description": "short description",
            "tech_stack": {
              "frontend": "technology used",
              "backend": "technology used",
              "database": "technology used"
            },
            "files": {
              "relative/path/to/file.ext": "complete file content here",
              "another/path/file.ext": "complete file content here"
            }
          }
          Rules:
          1. app_name must be kebab-case (e.g., "todo-app", "chat-system")
          2. Generate COMPLETE working code for every file (at least 20-30 files)
          3. Include: README.md, pubspec.yaml, all lib/ source files, full android/ folder with gradle and manifests
          4. Tech Stack: Flutter for Frontend, Firebase or Mock for Backend
          5. Add proper error handling and validation
          6. Make it production-ready with proper folder structure
          7. Do NOT use markdown code fences in file contents"""

          data = {
              "model": "openai/gpt-4o",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": f"Generate a complete Flutter application for this idea:\n\n{idea}"}
              ],
              "response_format": {"type": "json_object"}
          }

          print(f"🧠 Generating app for idea: {idea[:100]}...")
          response = requests.post("https://models.github.ai/inference/chat/completions", headers=headers, json=data)
          response.raise_for_status()
          
          app_data = response.json()['choices'][0]['message']['content']
          with open('/tmp/app_data.json', 'w') as f:
              f.write(app_data)
          PYEOF

      - name: 📁 Create App Files
        run: |
          python3 << 'PYEOF'
          import json
          import os

          with open('/tmp/app_data.json', 'r') as f:
              app_data = json.load(f)

          app_name = app_data['app_name']
          files = app_data['files']

          print(f"📁 Creating folder: {app_name}/")
          os.makedirs(app_name, exist_ok=True)

          for file_path, content in files.items():
              full_path = os.path.join(app_name, file_path)
              dir_path = os.path.dirname(full_path)
              if dir_path:
                  os.makedirs(dir_path, exist_ok=True)
              with open(full_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f" ✅ Created: {full_path}")

          with open('/tmp/app_name.txt', 'w') as f:
              f.write(app_name)
          PYEOF

      - name: 📝 Create Summary File
        run: |
          python3 << 'PYEOF'
          import json
          with open('/tmp/app_data.json', 'r') as f:
              app_data = json.load(f)
          app_name = app_data['app_name']
          summary = f"""# {app_name} - Generated App
          ## Description
          {app_data.get('description', 'AI Generated Full-Stack Application')}
          ## Tech Stack
          - **Frontend**: {app_data['tech_stack'].get('frontend', 'N/A')}
          - **Backend**: {app_data['tech_stack'].get('backend', 'N/A')}
          - **Database**: {app_data['tech_stack'].get('database', 'N/A')}
          ## Files Generated
          """
          for f in app_data['files'].keys():
              summary += f"- `{f}`\n"
          with open(f"{app_name}/GENERATED.md", 'w') as f:
              f.write(summary)
          PYEOF

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: 📤 Commit and Push Generated App
        run: |
          APP_NAME=$(cat /tmp/app_name.txt)
          git add "$APP_NAME/"
          git commit -m "🚀 Generated full-stack app: $APP_NAME" || echo "No changes"
          git push origin HEAD
