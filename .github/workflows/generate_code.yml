name: Generate Flutter App Code

on:
  push:
    branches:
      - main
    paths:
      - 'idea.txt'

permissions:
  contents: write # To commit generated code
  models: read    # To use GitHub Models

jobs:
  generate-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests

      - name: Read idea.txt
        id: read_idea
        run: |
          IDEA_CONTENT=$(cat idea.txt)
          echo "IDEA_CONTENT<<EOF" >> $GITHUB_ENV
          echo "$IDEA_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate Flutter code using GitHub Models
        id: generate_code
        run: |
          python -c "\
            import requests
            import os
            import json

            idea_content = os.environ.get('IDEA_CONTENT')
            github_token = os.environ.get('GITHUB_TOKEN')

            if not idea_content or not github_token:
                print('Error: IDEA_CONTENT or GITHUB_TOKEN not found.')
                exit(1)

            headers = {
                'Authorization': f'Bearer {github_token}',
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28'
            }

            data = {
                'model': 'openai/gpt-4o', # Or another suitable model
                'messages': [
                    {
                        'role': 'system',
                        'content': 'You are an expert Flutter developer. Generate a complete, self-contained Flutter application based on the user\'s idea. Provide the full project structure, including pubspec.yaml, lib/main.dart, and any other necessary files. Ensure the code is production-ready and follows best practices. The output should be a JSON object with a single key "files", where the value is an array of objects. Each object in the array should have "path" and "content" keys. For example: { "files": [ { "path": "pubspec.yaml", "content": "name: my_app\ndescription: A new Flutter project." }, { "path": "lib/main.dart", "content": "import 'package:flutter/material.dart';\nvoid main() => runApp(MyApp());" } ] }'
                    },
                    {
                        'role': 'user',
                        'content': f'Generate a Flutter app for the following idea: {idea_content}'
                    }
                ],
                'response_format': {'type': 'json_object'}
            }

            response = requests.post('https://models.github.ai/inference/chat/completions', headers=headers, json=data)
            response.raise_for_status()
            generated_data = response.json()

            app_name = 'generated_app'
            # Attempt to extract app name from idea.txt or generated content, default to generated_app
            # For now, let's keep it simple and use a fixed name or derive from idea.txt
            # A more robust solution would involve parsing the generated pubspec.yaml for the app name

            app_dir = f'apps/{app_name}'
            os.makedirs(app_dir, exist_ok=True)

            for file_data in generated_data['choices'][0]['message']['content']:
                file_path = os.path.join(app_dir, file_data['path'])
                os.makedirs(os.path.dirname(file_path), exist_ok=True)
                with open(file_path, 'w') as f:
                    f.write(file_data['content'])

            print(f'Generated app in {app_dir}')
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Commit generated code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/
          git commit -m "feat: Generate Flutter app from idea.txt"
          git push
