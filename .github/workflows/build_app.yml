name: Build Flutter App and Auto-Fix

on:
  workflow_run:
    workflows: ["🚀 Generate Full-Stack App from idea.txt"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Find generated app directory
        id: find_app_dir
        run: |
          APP_DIR=$(find apps -maxdepth 2 -type d -name "*" | grep -v "apps/$" | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "No generated app directory found." >&2
            exit 1
          fi
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Build and Auto-Fix Loop
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          MAX_RETRIES=3
          RETRY_COUNT=0
          BUILD_SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            
            # Try pub get first
            if ! flutter pub get --directory ${{ env.APP_DIR }} > error_log.txt 2>&1; then
              echo "Dependency resolution failed. Fixing pubspec..."
            # Then try build
            elif ! flutter build apk --release --verbose --directory ${{ env.APP_DIR }} > error_log.txt 2>&1; then
              echo "Build failed. Analyzing error..."
            else
              echo "Build successful!"
              BUILD_SUCCESS=true
              break
            fi

            # If we reach here, something failed. Send to AI.
            python3 << 'PYEOF'
            import requests
            import os
            import json

            token = os.environ["GITHUB_TOKEN"]
            app_dir = os.environ["APP_DIR"]
            
            with open("error_log.txt", "r") as f:
                error_log = f.read()[-2000:] # Last 2000 chars

            # Gather current file context (pubspec and main files)
            context = {}
            for root, _, files in os.walk(app_dir):
                for file in files:
                    if file.endswith(('.dart', '.yaml', '.gradle')):
                        path = os.path.join(root, file)
                        with open(path, 'r') as f:
                            context[path.replace(app_dir + "/", "")] = f.read()

            headers = {
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28"
            }

            data = {
                "model": "openai/gpt-4o",
                "messages": [
                    {"role": "system", "content": "You are a Flutter Build Expert. Fix the provided error. Output ONLY a JSON object: {'files': [{'path': '...', 'content': '...'}]}"},
                    {"role": "user", "content": f"Error:\n{error_log}\n\nContext:\n{json.dumps(context)}"}
                ],
                "response_format": {"type": "json_object"}
            }

            response = requests.post("https://models.github.ai/inference/chat/completions", headers=headers, json=data)
            fix_data = response.json()['choices'][0]['message']['content']
            fixes = json.loads(fix_data)

            for f in fixes.get('files', []):
                full_path = os.path.join(app_dir, f['path'])
                os.makedirs(os.path.dirname(full_path), exist_ok=True)
                with open(full_path, 'w') as out:
                    out.write(f['content'])
                print(f"Applied fix to: {f['path']}")
            PYEOF

            # Commit fix
            git config --global user.name "AI Fixer"
            git config --global user.email "ai-fixer@manus.im"
            git add .
            git commit -m "fix: AI auto-resolved build error (Attempt $((RETRY_COUNT + 1)))"
            git push origin HEAD
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          if [ "$BUILD_SUCCESS" = "false" ]; then exit 1; fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk
