name: lance_it
version: 1.0.0+1
description: A Flutter-based application for professional freelancing marketplace.

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.13.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.11.0
  firebase_storage: ^11.2.0
  provider: ^6.2.5
  flutter_riverpod: ^3.1.0
  flutter_local_notifications: ^14.1.2
  fluttertoast: ^8.4.0
  http: ^0.15.0
  shared_preferences: ^2.2.0
  image_picker: ^0.8.6
  file_picker: ^5.2.4
  cached_network_image: ^3.5.0+1
  google_fonts: ^3.0.1
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700